<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magazijn Master V7.9</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2897/2897830.png">

    <style>
        :root {
            --bg-color: #f0f2f5; --container-bg: #ffffff; --text-color: #333; --card-bg: #ffffff;
            --card-border: #ddd; --input-bg: #ffffff; --nav-bg: #f8f9fa;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212; --container-bg: #1e1e1e; --text-color: #e0e0e0; --card-bg: #2d2d2d;
                --card-border: #444; --input-bg: #333; --nav-bg: #252525;
            }
        }

        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 10px; padding-bottom: 140px; }
        .container { max-width: 700px; margin: auto; background: var(--container-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h1 { color: #1a73e8; text-align: center; font-size: 18px; text-transform: uppercase; border-bottom: 2px solid #1a73e8; padding-bottom: 8px; margin-top: 5px; }
        .user-info { margin-bottom: 15px; padding: 10px; background: rgba(26, 115, 232, 0.1); border-radius: 8px; border: 1px solid #1a73e8; }
        .user-info input { width: 100%; padding: 12px; border: 1px solid var(--card-border); border-radius: 6px; box-sizing: border-box; font-size: 16px; background: var(--input-bg); color: var(--text-color); }
        .nav-bar { display: flex; align-items: center; margin-bottom: 15px; gap: 10px; background: var(--nav-bg); padding: 8px; border-radius: 8px; }
        .back-btn { background: #6c757d; color: white; border: none; padding: 12px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { border: 1px solid var(--card-border); padding: 10px; text-align: center; border-radius: 10px; background: var(--card-bg); cursor: pointer; }
        .card img { width: 100%; height: 90px; object-fit: cover; border-radius: 6px; margin-bottom: 8px; background-color: #444; }
        .card p { margin: 0; font-weight: bold; font-size: 11px; text-transform: uppercase; color: var(--text-color); }
        .card.is-item { border-left: 6px solid #1a73e8; text-align: left; padding: 12px 10px; }
        .card.is-item p { font-size: 12px; }
        .card.is-item small { display: block; color: #aaa; font-size: 9px; margin-top: 4px; font-weight: normal; }
        .order-list { margin-top: 25px; border-top: 3px solid #1a73e8; padding-top: 15px; }
        .winkelmand-item { background: var(--nav-bg); padding: 10px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; border: 1px solid var(--card-border); align-items: center; font-size: 12px; color: var(--text-color); }
        .delete-btn { background: #dc3545; color: white; border: none; padding: 8px; border-radius: 6px; }
        .footer-btn { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 600px; z-index: 1000; }
        .send-btn { background: #28a745; color: white; border: none; padding: 18px; font-size: 18px; font-weight: bold; border-radius: 14px; width: 100%; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        textarea { background: var(--input-bg); color: var(--text-color); border: 1px solid var(--card-border); font-family: inherit; width:100%; border-radius:8px; padding:10px; box-sizing:border-box; margin-top:10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="user-info">
        <input type="text" id="userName" placeholder="UW NAAM..." oninput="saveUser()">
    </div>
    <div class="nav-bar">
        <button id="backBtn" class="back-btn" onclick="gaTerug()" style="display: none;">⬅</button>
        <h1 id="titel">MAGAZIJN MASTER</h1>
    </div>
    <div id="itemGrid" class="grid"></div>
    <div class="order-list">
        <div id="selectedItems"></div>
        <textarea id="extraInfo" rows="2" placeholder="EXTRA INFO (Machine nr, opmerking...)"></textarea>
    </div>
</div>

<div class="footer-btn">
    <button class="send-btn" onclick="verstuurBestelling()">📧 BESTELLING VERSTUREN</button>
</div>

<script>
    const PREFIXES = { 
        "FASTENERS": "FD_", "ELECTRONICS": "HD_", "POWER": "CD_", 
        "BATTERIJEN": "VT_", "VERLICHTING": "LP_", "CHEMIE": "CT_" 
    };

    const DATA = {
        "FASTENERS": {
            img: "https://loremflickr.com/320/240/bolts",
            sub: {
                "BOUTEN": {
                    img: "https://loremflickr.com/320/240/hexbolt",
                    sub: [
                        { name: "Zeskant M8x30", pn: "933-08-30", specs: "8.8 Verzinkt" },
                        { name: "Zeskant M10x40", pn: "933-10-40", specs: "8.8 Verzinkt" },
                        { name: "Inbus M6x20", pn: "912-06-20", specs: "DIN 912" },
                        { name: "Inbus M8x30", pn: "912-08-30", specs: "DIN 912" }
                    ]
                },
                "MOEREN": {
                    img: "https://loremflickr.com/320/240/nuts",
                    sub: [
                        { name: "M8 Borgmoer", pn: "985-08", specs: "DIN 985" },
                        { name: "M10 Borgmoer", pn: "985-10", specs: "DIN 985" },
                        { name: "M8 Lage Moer", pn: "439-08", specs: "DIN 439 (Plat)" },
                        { name: "M10 Lage Moer", pn: "439-10", specs: "DIN 439" }
                    ]
                },
                "REVETTEN / RINGEN": {
                    img: "https://loremflickr.com/320/240/washers",
                    sub: [
                        { name: "M8 Sluitring", pn: "125-08", specs: "DIN 125A" },
                        { name: "M10 Sluitring", pn: "125-10", specs: "DIN 125A" },
                        { name: "M8 Vlootring Breed", pn: "9021-08", specs: "DIN 9021" }
                    ]
                }
            }
        },
        "ELECTRONICS": {
            img: "https://loremflickr.com/320/240/fuses",
            sub: {
                "STEEKZEKERING STANDAARD": {
                    img: "https://loremflickr.com/320/240/fuse-standard",
                    sub: [
                        { name: "Standard 5A Beige", pn: "S-05", specs: "Hella" },
                        { name: "Standard 7.5A Bruin", pn: "S-75", specs: "Hella" },
                        { name: "Standard 10A Rood", pn: "S-10", specs: "Hella" },
                        { name: "Standard 15A Blauw", pn: "S-15", specs: "Hella" },
                        { name: "Standard 20A Geel", pn: "S-20", specs: "Hella" },
                        { name: "Standard 25A Wit", pn: "S-25", specs: "Hella" },
                        { name: "Standard 30A Groen", pn: "S-30", specs: "Hella" }
                    ]
                },
                "STEEKZEKERING MINI": {
                    img: "https://loremflickr.com/320/240/fuse-mini",
                    sub: [
                        { name: "Mini 5A Beige", pn: "M-05", specs: "Hella" },
                        { name: "Mini 10A Rood", pn: "M-10", specs: "Hella" },
                        { name: "Mini 15A Blauw", pn: "M-15", specs: "Hella" },
                        { name: "Mini 20A Geel", pn: "M-20", specs: "Hella" }
                    ]
                },
                "MAXI ZEKERINGEN": {
                    img: "https://loremflickr.com/320/240/fuse-maxi",
                    sub: [
                        { name: "Maxi 30A Groen", pn: "MAX-30", specs: "Groot model" },
                        { name: "Maxi 40A Oranje", pn: "MAX-40", specs: "Groot model" },
                        { name: "Maxi 60A Blauw", pn: "MAX-60", specs: "Groot model" }
                    ]
                }
            }
        },
        "VERLICHTING": {
            img: "https://loremflickr.com/320/240/bulbs",
            sub: {
                "LAMPEN 12V": {
                    img: "https://loremflickr.com/320/240/12v",
                    sub: [
                        { name: "H7 12V", pn: "12-H7", specs: "Auto" },
                        { name: "P21W 12V", pn: "12-P21", specs: "Pinker" }
                    ]
                },
                "LAMPEN 24V": {
                    img: "https://loremflickr.com/320/240/24v",
                    sub: [
                        { name: "H7 24V", pn: "24-H7", specs: "Truck" },
                        { name: "H1 24V", pn: "24-H1", specs: "Truck" }
                    ]
                },
                "LAMPEN 48V": {
                    img: "https://loremflickr.com/320/240/48v",
                    sub: [
                        { name: "48V 10W BA15s", pn: "48-10W", specs: "Heftruck" },
                        { name: "48V 21W BA15s", pn: "48-21W", specs: "Heftruck" }
                    ]
                }
            }
        },
        "POWER": {
            img: "https://loremflickr.com/320/240/power",
            sub: {
                "230V MATERIAAL": {
                    img: "https://loremflickr.com/320/240/230v-plug",
                    sub: [
                        { name: "230V Stekker Man", pn: "230-M", specs: "Rubber" },
                        { name: "230V Koppeling Vrouw", pn: "230-F", specs: "Rubber" }
                    ]
                },
                "400V CEE": {
                    img: "https://loremflickr.com/320/240/cee",
                    sub: [
                        { name: "CEE 16A 5p Man", pn: "16-5M", specs: "Rood" },
                        { name: "CEE 32A 5p Man", pn: "32-5M", specs: "Rood" }
                    ]
                }
            }
        },
        "CHEMIE": {
            img: "https://loremflickr.com/320/240/innotec",
            sub: {
                "LOCTITE / INNOTEC": {
                    img: "https://loremflickr.com/320/240/chemical",
                    sub: [
                        { name: "Loctite 243", pn: "243", specs: "Borging" },
                        { name: "Brake Clean", pn: "BC", specs: "Innotec" },
                        { name: "High-Tef Oil", pn: "HTO", specs: "Innotec" }
                    ]
                }
            }
        },
        "BATTERIJEN": {
            img: "https://loremflickr.com/320/240/varta",
            sub: {
                "VARTA": {
                    img: "https://loremflickr.com/320/240/battery",
                    sub: [
                        { name: "AA Alkaline", pn: "VAA", specs: "Varta" },
                        { name: "AAA Alkaline", pn: "VAAA", specs: "Varta" },
                        { name: "CR2032", pn: "V2032", specs: "Knoopcel" }
                    ]
                }
            }
        }
    };

    let winkelwagen = [];
    let navigatiePad = [];

    window.onload = () => {
        if(localStorage.getItem("magazijnUser")) document.getElementById("userName").value = localStorage.getItem("magazijnUser");
        renderMenu();
    };

    function saveUser() { localStorage.setItem("magazijnUser", document.getElementById("userName").value); }

    function renderMenu() {
        const grid = document.getElementById('itemGrid');
        const titel = document.getElementById('titel');
        const backBtn = document.getElementById('backBtn');
        grid.innerHTML = '';
        let huidigeData = { sub: DATA };
        navigatiePad.forEach(stap => { huidigeData = huidigeData.sub[stap]; });
        titel.innerText = navigatiePad.length > 0 ? navigatiePad[navigatiePad.length - 1] : "CATEGORIEËN";
        backBtn.style.display = navigatiePad.length > 0 ? 'block' : 'none';
        const content = huidigeData.sub || huidigeData;
        if (Array.isArray(content)) {
            content.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card is-item';
                div.innerHTML = `<p>${item.name}</p><small>${item.specs}</small>`;
                div.onclick = () => voegToe(item.name, item.pn);
                grid.appendChild(div);
            });
        } else {
            Object.keys(content).forEach(sleutel => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<img src="${content[sleutel].img}"><p>${sleutel}</p>`;
                div.onclick = () => gaDieper(sleutel);
                grid.appendChild(div);
            });
        }
    }

    function gaDieper(sleutel) { navigatiePad.push(sleutel); renderMenu(); window.scrollTo(0,0); }
    function gaTerug() { navigatiePad.pop(); renderMenu(); }

    function voegToe(naam, partNummer) {
        const hoofdCat = navigatiePad[0];
        const prefix = PREFIXES[hoofdCat] || "";
        winkelwagen.push(`${naam} (${prefix}${partNummer})`);
        updateWinkelwagenLayout();
    }

    function verwijderItem(index) { winkelwagen.splice(index, 1); updateWinkelwagenLayout(); }

    function updateWinkelwagenLayout() {
        const lijst = document.getElementById('selectedItems');
        lijst.innerHTML = '';
        winkelwagen.forEach((item, index) => {
            lijst.innerHTML += `<div class="winkelmand-item"><span>${item}</span><button class="delete-btn" onclick="verwijderItem(${index})">🗑️</button></div>`;
        });
    }

    function verstuurBestelling() {
        const name = document.getElementById("userName").value;
        if (!name) return alert("Vul je naam in!");
        if (winkelwagen.length === 0) return alert("Geen artikelen!");
        const lijstTekst = winkelwagen.join("%0D%0A- ");
        const extraInfo = document.getElementById("extraInfo").value;
        window.location.href = `mailto:aankoper@uwbedrijf.be?subject=Bestelling - ${name}&body=TECHNIEKER: ${name}%0D%0A%0D%0AARTIKELEN:%0D%0A- ${lijstTekst}%0D%0A%0D%0AINFO: ${extraInfo}`;
    }

    renderMenu();
</script>
</body>
</html>
